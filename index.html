<!DOCTYPE html> <!-- 宣告這是一個 HTML5 文件類型 -->
<html lang="zh-TW"> <!-- 指定這份網頁的主要語言是繁體中文 -->
<head>
    <meta charset="UTF-8"> <!-- 使用萬國碼 UTF-8，確保中文字能正常顯示不變亂碼 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- 讓網頁在手機上也能正常縮放 -->
    <title>心情儀表板</title> <!-- 瀏覽器分頁標籤上顯示的標題名稱 -->
    <link rel="stylesheet" href="style.css"> <!-- 連結 CSS 裝潢檔 -->
</head>
<body>

    <!-- 【視覺層：標題文字】 -->
    <!-- h2 標籤代表二級標題，id 是唯一身分證，讓 JavaScript 能找到它並更換文字內容 -->
    <h2 id="moodTitle">今天心情如何？</h2> 

    <!-- 【核心層：心情顯示方塊】 -->
    <!-- id="colorBox" 是 JS 控制背景顏色、旋轉、縮放的主角 -->
    <!-- span 標籤像是一個小標籤，用來精準包裹並更換 Emoji 圖案 -->
    <div id="colorBox">
        <span id="moodEmoji">😶</span>
    </div> 

    <!-- 【互動層：心情按鈕群組】 -->
    <!-- 使用 class="button-group" 方便在 CSS 中統一設定按鈕的排列間距 -->
    <div class="button-group">
        <button id="happyBtn">開心</button> 
        <button id="heartBtn">幸福</button>
        <button id="angryBtn">生氣</button> 
        <button id="shockBtn">震驚</button> 
        <button id="sadBtn">憂鬱</button> 
        <button id="resetBtn">恢復原狀</button>
    </div>

    <!-- 【邏輯層：引入 JavaScript】 -->
    <!-- 連結 JavaScript 檔案，通常放最後，確保元件載入完成後腳本才執行 -->
    <script src="mood.js"></script>
</body>
</html>
